name: Aegis-X CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-package: jdk
        java-version: '17'
        distribution: 'temurin'

    - name: Create directories
      run: |
        mkdir -p bin
        mkdir -p logs

    - name: Compile Aegis-X
      run: |
        javac -d bin \
        src/model/FlightPhase.java \
        src/model/TelemetryData.java \
        src/engine/LogManager.java \
        src/engine/ConfigLoader.java \
        src/engine/Parser.java \
        src/engine/ReportGenerator.java \
        src/engine/TelemetryReceiver.java \
        src/sim/MissileSimulator.java \
        src/Main.java

    - name: Generate Javadoc
      run: |
        javadoc -d docs/api -sourcepath src -subpackages engine:model:sim src/Main.java