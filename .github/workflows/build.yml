name: Aegis-X CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Compile Aegis-X
      run: |
        mkdir -p bin
        javac -d bin src/model/TelemetryData.java src/engine/Parser.java src/Main.java

    - name: Run Smoke Test
      run: |
        java -cp bin Main | grep "STATUS"